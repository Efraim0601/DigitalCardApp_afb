<div class="relative mx-auto w-full max-w-[680px]" (click)="$event.stopPropagation()">
  <div class="absolute -left-[9999px] top-0 h-48 w-48 overflow-hidden opacity-0 pointer-events-none">
    <app-qr-code #qrCode [url]="publicUrl" [card]="card" />
  </div>

  <div class="card-cta-zone mx-auto w-fit max-w-full">
    <button type="button" class="card-cta-icon" [title]="'action.share' | translate" (click)="toggleShare($event)">
      <svg viewBox="0 0 20 20" fill="none" class="h-5 w-5">
        <circle cx="15" cy="4" r="2" stroke="currentColor" stroke-width="1.5" />
        <circle cx="15" cy="16" r="2" stroke="currentColor" stroke-width="1.5" />
        <circle cx="5" cy="10" r="2" stroke="currentColor" stroke-width="1.5" />
        <path d="M7 9l6-3.5M7 11l6 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </button>

    <button type="button" class="card-cta-icon" [title]="'action.showQR' | translate" (click)="toggleQr($event)">
      <svg viewBox="0 0 20 20" fill="none" class="h-5 w-5">
        <rect x="2" y="2" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" />
        <rect x="4" y="4" width="3" height="3" fill="currentColor" />
        <rect x="11" y="2" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" />
        <rect x="13" y="4" width="3" height="3" fill="currentColor" />
        <rect x="2" y="11" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" />
        <rect x="4" y="13" width="3" height="3" fill="currentColor" />
        <rect x="11" y="11" width="3" height="3" fill="currentColor" />
        <rect x="16" y="11" width="2" height="2" fill="currentColor" />
        <rect x="11" y="16" width="2" height="2" fill="currentColor" />
        <rect x="15" y="15" width="3" height="3" fill="currentColor" />
      </svg>
    </button>

    <button
      type="button"
      class="card-cta-icon"
      [title]="'action.downloadCard' | translate"
      [disabled]="busy()"
      (click)="downloadCardImage()"
    >
      <svg viewBox="0 0 20 20" fill="none" class="h-5 w-5">
        <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5" />
        <circle cx="7" cy="9" r="2" stroke="currentColor" stroke-width="1.25" />
        <path d="M2 14l4-3 3 2.5 3-3 6 4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    <button type="button" class="card-cta-icon" [title]="'action.call' | translate" (click)="call()">
      <svg viewBox="0 0 20 20" fill="none" class="h-5 w-5">
        <path
          d="M4 3h3l1.5 4-2 1.5A11 11 0 0 0 13 15l1.5-2L18 14.5V17.5A1.5 1.5 0 0 1 16.5 19C9.044 19 1 10.956 1 3.5A1.5 1.5 0 0 1 2.5 2H4z"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <button type="button" class="card-cta-icon" [title]="'action.sendEmail' | translate" (click)="email()">
      <svg viewBox="0 0 20 20" fill="none" class="h-5 w-5">
        <rect x="2" y="4" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.5" />
        <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <app-share-popover
    [isOpen]="sharePopoverOpen()"
    [isBusy]="busy()"
    [isCreator]="isCreator"
    (shareImage)="shareCardImage()"
    (shareLink)="shareCardLink()"
    (shareQr)="shareQRCode()"
    (copyEmployeeLink)="copyEmployeeLink()"
  />

  @if (qrPopoverOpen()) {
    <div
      class="absolute bottom-full left-2 right-2 z-20 mb-3 rounded-xl border border-slate-200 bg-white p-4 shadow-xl sm:left-1/2 sm:right-auto sm:w-[min(360px,calc(100vw-2rem))] sm:-translate-x-1/2"
      (click)="$event.stopPropagation()"
    >
      <div class="text-center text-sm font-medium text-slate-700">{{ 'action.scanQR' | translate }}</div>
      <div class="mt-3 flex justify-center">
        <app-qr-code [url]="publicUrl" [card]="card" />
      </div>
      <div class="mt-3 flex justify-center">
        <button
          type="button"
          class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm font-semibold text-emerald-800 hover:bg-emerald-100"
          (click)="saveContact()"
        >
          {{ 'action.saveContact' | translate }}
        </button>
      </div>
    </div>
  }
</div>
