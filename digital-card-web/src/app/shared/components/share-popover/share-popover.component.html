@if (isOpen) {
  <div
    class="absolute bottom-full left-2 right-2 z-20 mb-3 flex flex-col gap-3 rounded-xl border border-slate-200 bg-white p-3 shadow-xl sm:left-4 sm:right-auto sm:w-[260px]"
    (click)="$event.stopPropagation()"
  >
    <div>
      <p class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-500">
        {{ 'share.cardImage' | translate }}
      </p>
      <button
        type="button"
        class="flex w-full items-center gap-2 rounded-lg px-3 py-2.5 text-left text-sm text-slate-700 transition-colors hover:bg-slate-100 disabled:opacity-60"
        [disabled]="isBusy"
        (click)="shareImage.emit()"
      >
        <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5 shrink-0">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6" />
          <circle cx="9" cy="9" r="2" stroke="currentColor" stroke-width="1.6" />
          <path d="M21 15l-5-5-11 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>{{ 'share.shareCardImage' | translate }}</span>
      </button>
    </div>

    <div>
      <p class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-500">
        {{ 'share.cardLink' | translate }}
      </p>
      <div class="flex flex-col gap-0.5">
        <button
          type="button"
          class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-left text-sm text-slate-700 transition-colors hover:bg-slate-100"
          (click)="shareLink.emit()"
        >
          <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5 shrink-0">
            <circle cx="18" cy="5" r="2.2" stroke="currentColor" stroke-width="1.6" />
            <circle cx="18" cy="19" r="2.2" stroke="currentColor" stroke-width="1.6" />
            <circle cx="6" cy="12" r="2.2" stroke="currentColor" stroke-width="1.6" />
            <path d="M8 11l8-5M8 13l8 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          <span>{{ 'share.shareCardLink' | translate }}</span>
        </button>
        <button
          type="button"
          class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-left text-sm text-slate-700 transition-colors hover:bg-slate-100"
          (click)="shareQr.emit()"
        >
          <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5 shrink-0">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" />
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" />
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" />
            <path d="M14 14h3v3h-3zM20 14h1v1h-1zM14 20h1v1h-1zM17 17h4v4h-4z" fill="currentColor" />
          </svg>
          <span>{{ 'share.shareQRCode' | translate }}</span>
        </button>
      </div>
    </div>

    @if (isCreator) {
      <div class="border-t border-slate-200 pt-2">
        <button
          type="button"
          class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-left text-sm text-slate-700 transition-colors hover:bg-slate-100"
          (click)="copyEmployeeLink.emit()"
        >
          <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5 shrink-0">
            <circle cx="10" cy="8" r="3" stroke="currentColor" stroke-width="1.6" />
            <path d="M3.5 20c0-3.3 2.9-6 6.5-6s6.5 2.7 6.5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <circle cx="18.5" cy="15.5" r="1.5" stroke="currentColor" stroke-width="1.4" />
            <path d="M18.5 12.5v1M18.5 17.5v1M21 15.5h-1M17 15.5h-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          <span>{{ 'share.copyEmployeeLink' | translate }}</span>
        </button>
      </div>
    }
  </div>
}
