@if (isOpen) {
  <div
    class="absolute bottom-full left-2 right-2 z-20 mb-3 rounded-xl border border-slate-200 bg-white p-4 shadow-xl sm:left-4 sm:right-auto sm:w-[360px]"
    (click)="$event.stopPropagation()"
  >
    <div class="text-[12px] font-semibold uppercase tracking-[.12em] text-slate-500">{{ 'share.cardImage' | translate }}</div>
    <button
      class="mt-2 flex w-full items-center gap-2 rounded-lg px-2 py-2 text-left text-sm text-slate-700 transition hover:bg-slate-50 disabled:opacity-60"
      type="button"
      [disabled]="isBusy"
      (click)="shareImage.emit()"
    >
      <span>{{ 'share.shareCardImage' | translate }}</span>
    </button>

    <div class="mt-4 text-[12px] font-semibold uppercase tracking-[.12em] text-slate-500">{{ 'share.cardLink' | translate }}</div>
    <div class="mt-2 flex flex-col gap-1">
      <button
        class="flex w-full items-center gap-2 rounded-lg px-2 py-2 text-left text-sm text-slate-700 transition hover:bg-slate-50"
        type="button"
        (click)="shareLink.emit()"
      >
        <span>{{ 'share.shareCardLink' | translate }}</span>
      </button>
      <button
        class="flex w-full items-center gap-2 rounded-lg px-2 py-2 text-left text-sm text-slate-700 transition hover:bg-slate-50"
        type="button"
        (click)="shareQr.emit()"
      >
        <span>{{ 'share.shareQRCode' | translate }}</span>
      </button>
      <button
        class="flex w-full items-center gap-2 rounded-lg px-2 py-2 text-left text-sm text-slate-700 transition hover:bg-slate-50"
        type="button"
        (click)="copyLink.emit()"
      >
        <span>{{ 'action.copyLink' | translate }}</span>
      </button>
    </div>

    @if (isCreator) {
      <div class="mt-3 border-t border-slate-200 pt-3">
        <button
          class="flex w-full items-center gap-2 rounded-lg px-2 py-2 text-left text-sm text-slate-700 transition hover:bg-slate-50"
          type="button"
          (click)="copyEmployeeLink.emit()"
        >
          <span>{{ 'share.copyEmployeeLink' | translate }}</span>
        </button>
      </div>
    }

    <div class="mt-3 break-all rounded-lg bg-slate-50 p-2 text-xs text-slate-700">
      {{ publicUrl }}
    </div>

    @if (feedbackKey) {
      <div class="mt-2 text-xs font-medium text-emerald-700">{{ feedbackKey | translate }}</div>
    }

    <div class="mt-3 flex justify-end">
      <button
        class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50"
        type="button"
        (click)="close.emit()"
      >
        {{ 'common.close' | translate }}
      </button>
    </div>
  </div>
}
