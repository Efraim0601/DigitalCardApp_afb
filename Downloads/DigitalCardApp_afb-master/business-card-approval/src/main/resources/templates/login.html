<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login</title>
<style>
:root{--bg:#f5f3ef;--bg2:#fff;--ink:#1a1a1a;--ink2:#666;--ink3:#999;--line:#e0dcd4;--brand:#a8232f;--brand-d:#7c1620}
[data-theme="dark"]{--bg:#0f1114;--bg2:#1a1d23;--ink:#dde1e8;--ink2:#9ba3b0;--ink3:#636d7d;--line:#2a2f38;--brand:#d4434f;--brand-d:#b02d3a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background .3s}
.logo{margin-bottom:24px}.logo img{height:52px}
.card{background:var(--bg2);border-radius:6px;border:1px solid var(--line);width:100%;max-width:400px;overflow:hidden;transition:background .3s,border .3s}
.card-head{background:var(--brand);padding:22px 28px;color:#fff}
.card-head h2{font-size:18px;font-weight:600;margin-bottom:4px}
.card-head p{font-size:12px;opacity:.75}
.card-body{padding:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input{display:block;width:100%;border:1px solid var(--line);border-radius:4px;height:42px;padding:0 12px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--bg2);transition:border .15s}
.field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(168,35,47,.12)}
.err{background:#fdecea;border-left:3px solid #c0392b;padding:10px 14px;color:#c0392b;font-size:13px;border-radius:4px;margin-bottom:18px;display:none}
.btn{display:block;width:100%;background:var(--brand);color:#fff;border:none;border-radius:4px;height:44px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:var(--brand-d)}.btn:disabled{opacity:.5}
.hint{margin-top:16px;text-align:center;font-size:12px;color:var(--ink3)}.hint strong{color:var(--ink2)}
.card-foot{padding:14px 28px;border-top:1px solid var(--line);font-size:11px;color:var(--ink3);text-align:center}
</style>
</head>
<body>
<div class="logo"><img src="https://upload.wikimedia.org/wikipedia/fr/e/eb/Logo_Afriland.png" alt="Afriland First Bank"></div>
<div class="card">
  <div class="card-head"><h2>Espace administrateur</h2><p>Gestion des demandes de cartes de visite</p></div>
  <div class="card-body">
    <div class="err" id="err"></div>
    <div class="field"><label for="username">Identifiant</label><input type="text" id="username" placeholder="admin" autocomplete="username"></div>
    <div class="field"><label for="password">Mot de passe</label><input type="password" id="password" autocomplete="current-password"></div>
    <button class="btn" id="btn" onclick="doLogin()">Se connecter</button>
    <p class="hint">Identifiant : <strong>admin</strong> / Mot de passe : <strong>afriland2024</strong></p>
  </div>
  <div class="card-foot">Afriland First Bank</div>
</div>
<script th:inline="none">
(function(){var t=localStorage.getItem('afb_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')})();
document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
document.getElementById('username').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
async function doLogin(){var u=document.getElementById('username').value.trim(),p=document.getElementById('password').value,e=document.getElementById('err'),b=document.getElementById('btn');if(!u||!p){e.textContent='Identifiants requis.';e.style.display='block';return}e.style.display='none';b.disabled=true;b.textContent='...';try{var r=await fetch('/admin/authenticate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var j=await r.json();if(j.success){window.location.href='/admin'}else{e.textContent=j.error||'Identifiants invalides.';e.style.display='block'}}catch(x){e.textContent='Erreur reseau.';e.style.display='block'}finally{b.disabled=false;b.textContent='Se connecter'}}
</script>
</body>
</html>
