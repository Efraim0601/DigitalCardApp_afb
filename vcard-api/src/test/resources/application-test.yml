spring:
  datasource:
    url: jdbc:h2:mem:vcard_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  admin:
    email: test@test.com
    password: test
    session-secret: test-secret
  cors:
    allowed-origins: http://localhost:4200
  card:
    fixed-phone: "222 233 068"
    fixed-fax: "222 221 785"
  cookie:
    secure: false
    same-site: Strict
