sonar.projectKey=cardyo-backend
sonar.projectName=Cardyo Backend
sonar.projectVersion=0.0.1

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.libraries=target/dependency/*.jar

sonar.sourceEncoding=UTF-8
sonar.java.source=17

# JaCoCo test coverage report (generated by `mvn test`)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclude generated/boilerplate code from analysis and coverage
sonar.exclusions=**/dto/**,**/entity/**,**/CardyoApplication.java
sonar.coverage.exclusions=**/CardyoApplication.java,**/dto/**,**/entity/**,**/config/**
