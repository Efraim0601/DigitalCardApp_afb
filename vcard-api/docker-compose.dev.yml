services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    ports:
      # Host port configurable to avoid conflicts with other Postgres
      # instances. Inside the compose network the app still reaches the
      # db on the standard 5432 via the `db` service name.
      - "${DB_HOST_PORT:-5556}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      # Host port configurable; container keeps listening on 9999.
      - "${APP_HOST_PORT:-8766}:9999"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
      ADMIN_EMAIL: admin@afrilandfirstbank.com
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:4200,http://62.169.26.178:8766
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
