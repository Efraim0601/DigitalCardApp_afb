services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcard -d vcard"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  backend:
    build:
      context: ./vcard-api
      dockerfile: Dockerfile
    ports:
      - "8766:8080"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
      ADMIN_EMAIL: admin@afrilandfirstbank.com
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./digital-card-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
