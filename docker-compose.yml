services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    ports:
      - "${DB_HOST_PORT:-5555}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcard -d vcard"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  backend:
    build:
      context: ./vcard-api
      dockerfile: Dockerfile
      network: host
    ports:
      - "${BACKEND_HOST_PORT:-8767}:9999"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
      ADMIN_EMAIL: admin@afrilandfirstbank.com
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:8766,http://62.169.26.178:8766,https://afbvcard.afbdei.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./digital-card-web
      dockerfile: Dockerfile
      network: host
    ports:
      - "${FRONTEND_HOST_PORT:-8766}:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
