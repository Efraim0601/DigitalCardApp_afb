services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    ports:
      - "${DB_HOST_PORT:-5555}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcard -d vcard"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  backend:
    build:
      context: ./vcard-api
      dockerfile: Dockerfile
    ports:
      - "8800:9999"
      - "${BACKEND_HOST_PORT:-8767}:9999"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
      ADMIN_EMAIL: admin@afrilandfirstbank.com
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: change-me-in-production
      PORTAL_EMAIL_DOMAIN: afrilandfirstbank.com
      CORS_ORIGINS: http://localhost:8801,http://localhost:5000,http://62.169.26.178:8801,https://afbvcard.afbdei.com,http://localhost:8766,http://62.169.26.178:8766,https://afbvcard.afbdei.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./digital-card-web
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

  approval:
    build:
      context: ./business-card-approval
      dockerfile: Dockerfile
    environment:
      VCARD_API_BASE: http://backend:9999
      VCARD_API_EMAIL: admin@afrilandfirstbank.com
      VCARD_API_PASS: admin
      VCARD_FRONT_URL: http://localhost:8801
      DB_PATH: /app/data/approval_db
    volumes:
      - approval_data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8801:8080"
      - "${FRONTEND_HOST_PORT:-8766}:8080"
    depends_on:
      - frontend
      - approval
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  approval_data:

